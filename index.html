<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Summer Budget Tracker ☀️</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:linear-gradient(160deg,#fff7ed 0%,#fef3c7 45%,#ecfeff 100%);font-family:'Segoe UI',sans-serif;color:#7c2d12}
    @keyframes floatUp{0%{transform:translateY(0) rotate(0deg);opacity:0}10%{opacity:0.2}90%{opacity:0.1}100%{transform:translateY(-110vh) rotate(15deg);opacity:0}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulseRed{0%,100%{box-shadow:0 0 8px rgba(239,68,68,0.4)}50%{box-shadow:0 0 22px rgba(239,68,68,0.7)}}
    input[type=number]::-webkit-inner-spin-button{opacity:0.4}
    input::placeholder{color:rgba(120,80,20,0.4)}
    select option{background:#fff7ed;color:#7c2d12}
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#f97316;border-radius:3px}
    .ptcl{position:fixed;pointer-events:none;z-index:0;opacity:0.2;animation:floatUp linear infinite}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect} = React;

const COLORS = ["#f97316","#eab308","#06b6d4","#a855f7","#22c55e","#ec4899","#3b82f6","#f43f5e","#14b8a6","#fb923c"];
const EMOJIS = ["☀️","🌊","🍦","🌺","🐚","🌴","🍉","⭐","🦋","🌸"];
const fmt  = n => "$"+Number(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtS = n => "$"+Number(n).toLocaleString("en-US",{minimumFractionDigits:0,maximumFractionDigits:0});
const today = () => new Date().toISOString().slice(0,10);
const save = (k,v) => { try{localStorage.setItem(k,JSON.stringify(v))}catch(_){} };
const load = (k,d) => { try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch(_){return d} };

const DEF_CATS = [
  {id:1,name:"Net Rent",      budget:1667.50,color:"#f97316"},
  {id:2,name:"Utilities",     budget:80.00,  color:"#eab308"},
  {id:3,name:"Phone",         budget:60.55,  color:"#06b6d4"},
  {id:4,name:"Subscriptions", budget:25.99,  color:"#a855f7"},
  {id:5,name:"Groceries",     budget:360.00, color:"#22c55e"},
  {id:6,name:"Lifestyle",     budget:1342.00,color:"#ec4899"},
];
const DEF_GOALS = [
  {id:"g1",label:"Emergency Fund",   target:7000, monthly:583, color:"#06b6d4"},
  {id:"g2",label:"Long-term Savings",target:27500,monthly:1000,color:"#a855f7"},
];
const DEF_EXPINC = [
  {id:"p1",label:"Paycheck 1 (Every 14 days)",amount:2035.04},
  {id:"p2",label:"Paycheck 2 (Every 14 days)",amount:2019.78},
  {id:"rm",label:"Roommate (Monthly)",         amount:1727.50},
];

function Particles(){
  const items=Array.from({length:16},(_,i)=>({id:i,left:`${(i*6.4)%100}%`,size:9+(i%4)*2,dur:`${16+(i%6)*2}s`,del:`${(i*1.5)%12}s`,e:EMOJIS[i%EMOJIS.length]}));
  return items.map(p=>React.createElement('div',{key:p.id,className:"ptcl",style:{left:p.left,bottom:-40,fontSize:p.size,animationDuration:p.dur,animationDelay:p.del}},p.e));
}

function Card({children,over,style={}}){
  return React.createElement('div',{style:{background:"rgba(255,255,255,0.6)",backdropFilter:"blur(16px)",border:over?"1.5px solid rgba(239,68,68,0.5)":"1px solid rgba(255,200,100,0.4)",borderRadius:20,padding:18,marginBottom:14,boxShadow:over?undefined:"0 2px 16px rgba(249,115,22,0.07)",animation:over?"pulseRed 2s infinite":undefined,...style}},children);
}
function ST({emoji,children}){
  return React.createElement('h2',{style:{margin:"0 0 14px",fontSize:13,fontWeight:800,color:"#c2410c",letterSpacing:1.2,display:"flex",alignItems:"center",gap:6}},`${emoji} ${children}`);
}
function PBar({pct,color,over}){
  return React.createElement('div',{style:{height:6,borderRadius:3,background:"rgba(0,0,0,0.08)",overflow:"hidden",marginTop:5}},
    React.createElement('div',{style:{height:"100%",width:`${Math.min(pct,100)}%`,borderRadius:3,background:over?"linear-gradient(90deg,#ef4444,#dc2626)":`linear-gradient(90deg,${color},${color}88)`,transition:"width 0.4s"}})
  );
}
function IE({value,onChange,type="text",wide=false}){
  const [ed,setEd]=useState(false);
  const [v,setV]=useState(value);
  useEffect(()=>setV(value),[value]);
  const commit=()=>{onChange(type==="number"?parseFloat(v)||0:v);setEd(false)};
  if(ed) return React.createElement('input',{autoFocus:true,type,value:v,onChange:e=>setV(e.target.value),onBlur:commit,onKeyDown:e=>e.key==="Enter"&&commit(),style:{width:wide?150:85,border:"1.5px solid #f97316",borderRadius:7,padding:"2px 7px",fontSize:"inherit",color:"#7c2d12",background:"rgba(255,255,255,0.9)"}});
  return React.createElement('span',{onClick:()=>{setV(value);setEd(true)},title:"Click to edit",style:{cursor:"pointer",borderBottom:"1.5px dashed #f97316",paddingBottom:1,color:"#92400e"}},type==="number"?fmt(value):value);
}

function App(){
  const [tab,setTab]         = useState("dashboard");
  const [cats,setCats]       = useState(()=>load("sbt4_cats",DEF_CATS));
  const [goals,setGoals]     = useState(()=>load("sbt4_goals",DEF_GOALS));
  const [expInc,setExpInc]   = useState(()=>load("sbt4_expinc",DEF_EXPINC));
  const [incLog,setIncLog]   = useState(()=>load("sbt4_inc",[]));
  const [expLog,setExpLog]   = useState(()=>load("sbt4_exp",[]));
  const [savLog,setSavLog]   = useState(()=>load("sbt4_sav",[]));
  const [investMo,setInvMo]  = useState(()=>load("sbt4_invmo",250));
  const [ef,setEf]   = useState({desc:"",amount:"",catId:1,date:today()});
  const [sf,setSf]   = useState({desc:"",amount:"",goalId:"g1",date:today()});
  const [inf,setInf] = useState({desc:"",amount:"",type:"paycheck",date:today()});
  const [newCat,setNewCat]     = useState({name:"",budget:""});
  const [newGoal,setNewGoal]   = useState({label:"",target:"",monthly:""});
  const [newExpInc,setNewExpInc] = useState({label:"",amount:""});

  useEffect(()=>save("sbt4_cats",cats),[cats]);
  useEffect(()=>save("sbt4_goals",goals),[goals]);
  useEffect(()=>save("sbt4_expinc",expInc),[expInc]);
  useEffect(()=>save("sbt4_inc",incLog),[incLog]);
  useEffect(()=>save("sbt4_exp",expLog),[expLog]);
  useEffect(()=>save("sbt4_sav",savLog),[savLog]);
  useEffect(()=>save("sbt4_invmo",investMo),[investMo]);

  const totalIncome = incLog.reduce((s,e)=>s+e.amount,0);
  const catTotals   = cats.reduce((a,c)=>{a[c.id]=expLog.filter(e=>e.catId===c.id).reduce((s,e)=>s+e.amount,0);return a},{});
  const goalTotals  = goals.reduce((a,g)=>{a[g.id]=savLog.filter(e=>e.goalId===g.id).reduce((s,e)=>s+e.amount,0);return a},{});
  const investTotal = savLog.filter(e=>e.goalId==="inv").reduce((s,e)=>s+e.amount,0);
  const totalExp    = Object.values(catTotals).reduce((s,v)=>s+v,0);
  const totalBudg   = cats.reduce((s,c)=>s+c.budget,0);
  const totalSav    = Object.values(goalTotals).reduce((s,v)=>s+v,0);
  const totalOut    = totalExp+totalSav+investTotal;
  const remaining   = totalIncome-totalOut;
  const allHistory  = [
    ...incLog.map(e=>({...e,kind:"income"})),
    ...expLog.map(e=>({...e,kind:"expense"})),
    ...savLog.map(e=>({...e,kind:"savings"})),
  ].sort((a,b)=>new Date(b.date)-new Date(a.date));

  const addInc=()=>{const amt=parseFloat(inf.amount);if(!inf.desc.trim()||!amt||amt<=0)return;setIncLog(p=>[...p,{id:Date.now(),date:inf.date,type:inf.type,desc:inf.desc.trim(),amount:amt}]);setInf(f=>({...f,desc:"",amount:""}))};
  const addExp=()=>{const amt=parseFloat(ef.amount);if(!ef.desc.trim()||!amt||amt<=0)return;setExpLog(p=>[...p,{id:Date.now(),date:ef.date,catId:parseInt(ef.catId),desc:ef.desc.trim(),amount:amt}]);setEf(f=>({...f,desc:"",amount:""}))};
  const addSav=()=>{const amt=parseFloat(sf.amount);if(!sf.desc.trim()||!amt||amt<=0)return;setSavLog(p=>[...p,{id:Date.now(),date:sf.date,goalId:sf.goalId,desc:sf.desc.trim(),amount:amt}]);setSf(f=>({...f,desc:"",amount:""}))};

  const inp={background:"rgba(255,255,255,0.75)",border:"1.5px solid rgba(249,115,22,0.3)",borderRadius:10,padding:"10px 12px",color:"#7c2d12",fontSize:13,width:"100%"};
  const addBtn={background:"linear-gradient(135deg,#f97316,#eab308)",border:"none",borderRadius:8,color:"#fff",padding:"10px 14px",cursor:"pointer",fontWeight:700,fontSize:13,whiteSpace:"nowrap"};
  const delBtn={background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:6,color:"#dc2626",padding:"5px 10px",cursor:"pointer",fontSize:12,fontWeight:700,whiteSpace:"nowrap"};
  const tabAct={background:"linear-gradient(135deg,#f97316,#eab308)",color:"#fff",boxShadow:"0 2px 10px rgba(249,115,22,0.35)"};
  const tabInact={background:"rgba(255,255,255,0.55)",color:"#c2410c"};
  const incColors={paycheck:"#22c55e",roommate:"#06b6d4",bonus:"#f97316",other:"#a855f7"};
  const incLabels={paycheck:"Paycheck",roommate:"Roommate",bonus:"Bonus",other:"Other"};

  const h = (label, items, color, isInc) => {
    if(items.length===0) return null;
    const total=items.reduce((s,e)=>s+e.amount,0);
    return React.createElement('div',{style:{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid rgba(249,115,22,0.08)"}},
      React.createElement('span',{style:{fontSize:13,display:"flex",alignItems:"center",gap:6}},
        React.createElement('span',{style:{width:8,height:8,borderRadius:"50%",background:color,display:"inline-block"}}),
        label,
        React.createElement('span',{style:{opacity:0.5,fontSize:11}},`(${items.length})`)
      ),
      React.createElement('span',{style:{fontWeight:700}},fmt(total))
    );
  };

  return React.createElement('div',{style:{minHeight:"100vh",background:"linear-gradient(160deg,#fff7ed 0%,#fef3c7 45%,#ecfeff 100%)",fontFamily:"'Segoe UI',sans-serif",color:"#7c2d12",position:"relative"}},
    React.createElement(Particles),
    React.createElement('style',null,`
      @keyframes floatUp{0%{transform:translateY(0) rotate(0deg);opacity:0}10%{opacity:0.2}90%{opacity:0.1}100%{transform:translateY(-110vh) rotate(12deg);opacity:0}}
      @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
      @keyframes pulseRed{0%,100%{box-shadow:0 0 8px rgba(239,68,68,0.4)}50%{box-shadow:0 0 22px rgba(239,68,68,0.7)}}
      input::placeholder{color:rgba(120,80,20,0.4)} select option{background:#fff7ed;color:#7c2d12}
    `),
    React.createElement('div',{style:{position:"relative",zIndex:1,maxWidth:860,margin:"0 auto",padding:"20px 12px 60px"}},

      // Header
      React.createElement('div',{style:{textAlign:"center",marginBottom:18}},
        React.createElement('div',{style:{fontSize:34}},"☀️"),
        React.createElement('h1',{style:{margin:"4px 0 2px",fontSize:"clamp(20px,5vw,28px)",fontWeight:900,background:"linear-gradient(90deg,#f97316,#eab308,#06b6d4)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}},"Summer Budget Tracker"),
        React.createElement('p',{style:{margin:0,fontSize:13,color:"#c2410c",opacity:0.65}},"Your personal finance dashboard 🌊")
      ),

      // Tabs
      React.createElement('div',{style:{display:"flex",gap:4,marginBottom:18,background:"rgba(255,255,255,0.6)",borderRadius:16,padding:5,border:"1px solid rgba(255,200,100,0.4)"}},
        [["dashboard","📊","Dashboard"],["log_inc","💵","Income"],["log_exp","💸","Expenses"],["log_sav","🎯","Savings"],["history","📋","History"],["settings","⚙️","Settings"]].map(([t,icon,label])=>
          React.createElement('button',{key:t,onClick:()=>setTab(t),style:{flex:1,border:"none",cursor:"pointer",borderRadius:12,padding:"8px 2px",fontWeight:700,transition:"all 0.15s",...(tab===t?tabAct:tabInact)}},
            React.createElement('div',{style:{fontSize:15}},icon),
            React.createElement('div',{style:{fontSize:10,marginTop:2}},label)
          )
        )
      ),

      // DASHBOARD
      tab==="dashboard" && React.createElement('div',{style:{animation:"fadeIn 0.4s ease"}},
        React.createElement(Card,{over:remaining<0},
          React.createElement(ST,{emoji:"💰"},"NET POSITION"),
          React.createElement('div',{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,textAlign:"center"}},
            [["Income",totalIncome,"#22c55e"],["Out",totalOut,"#f97316"],["Left",remaining,remaining<0?"#ef4444":"#06b6d4"]].map(([l,v,c])=>
              React.createElement('div',{key:l,style:{background:"rgba(255,255,255,0.5)",borderRadius:12,padding:"10px 4px"}},
                React.createElement('div',{style:{fontSize:10,opacity:0.55,fontWeight:700,letterSpacing:0.8,marginBottom:3}},l),
                React.createElement('div',{style:{fontSize:"clamp(13px,4vw,22px)",fontWeight:900,color:c}},fmt(v))
              )
            )
          ),
          React.createElement('div',{style:{marginTop:10,textAlign:"center",background:remaining<0?"rgba(239,68,68,0.1)":"rgba(34,197,94,0.1)",border:remaining<0?"1px solid rgba(239,68,68,0.4)":"1px solid rgba(34,197,94,0.3)",borderRadius:10,padding:"7px",color:remaining<0?"#ef4444":"#16a34a",fontWeight:700,fontSize:13}},
            remaining<0?`🔴 Over by ${fmt(Math.abs(remaining))}`:`✅ ${fmt(remaining)} remaining`)
        ),

        React.createElement(Card,null,
          React.createElement(ST,{emoji:"💵"},"INCOME TO DATE"),
          incLog.length===0 && React.createElement('div',{style:{textAlign:"center",opacity:0.45,padding:"14px 0",fontSize:13}},"No income logged yet — head to the Income tab! 💵"),
          h("Paychecks",incLog.filter(e=>e.type==="paycheck"),"#22c55e",true),
          h("Roommate",incLog.filter(e=>e.type==="roommate"),"#06b6d4",true),
          h("Bonuses",incLog.filter(e=>e.type==="bonus"),"#f97316",true),
          h("Other",incLog.filter(e=>e.type==="other"),"#a855f7",true),
          incLog.length>0 && React.createElement('div',{style:{display:"flex",justifyContent:"space-between",padding:"9px 0 0",borderTop:"1.5px solid rgba(249,115,22,0.2)",marginTop:4}},
            React.createElement('span',{style:{fontSize:13,fontWeight:800}},"TOTAL INCOME"),
            React.createElement('span',{style:{fontWeight:900,color:"#22c55e",fontSize:15}},fmt(totalIncome))
          )
        ),

        React.createElement(Card,null,
          React.createElement(ST,{emoji:"🎯"},"SAVINGS GOALS"),
          goals.map(g=>{
            const actual=goalTotals[g.id]||0; const pct=(actual/g.target)*100;
            return React.createElement('div',{key:g.id,style:{marginBottom:12,padding:"11px 13px",background:"rgba(255,255,255,0.5)",borderRadius:12,border:`1px solid ${g.color}33`}},
              React.createElement('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
                React.createElement('span',{style:{fontWeight:700,fontSize:13,color:g.color}},g.label),
                React.createElement('span',{style:{fontSize:12,fontWeight:600,color:g.color}},pct.toFixed(0)+"%")
              ),
              React.createElement('div',{style:{fontSize:12,opacity:0.6,margin:"3px 0"}},`${fmt(actual)} saved of ${fmtS(g.target)} · ${fmt(g.monthly)}/mo`),
              React.createElement(PBar,{pct,color:g.color}),
              React.createElement('div',{style:{fontSize:11,marginTop:4,opacity:0.5}},`Remaining: ${fmt(g.target-actual)}`)
            );
          }),
          React.createElement('div',{style:{padding:"11px 13px",background:"rgba(255,255,255,0.5)",borderRadius:12,border:"1px solid #3b82f633",marginBottom:12}},
            React.createElement('div',{style:{fontWeight:700,fontSize:13,color:"#3b82f6"}},"Investments"),
            React.createElement('div',{style:{fontSize:12,opacity:0.6,margin:"3px 0"}},`${fmt(investTotal)} saved · ${fmt(investMo)}/mo target`),
            React.createElement(PBar,{pct:(investTotal/(investMo*12))*100,color:"#3b82f6"})
          ),
          React.createElement('div',{style:{padding:"10px 13px",background:"linear-gradient(135deg,rgba(249,115,22,0.08),rgba(234,179,8,0.08))",borderRadius:10,display:"flex",justifyContent:"space-between",alignItems:"center"}},
            React.createElement('span',{style:{fontWeight:800,fontSize:13}},"TOTAL WEALTH BUILDING"),
            React.createElement('span',{style:{fontWeight:900,color:"#22c55e",fontSize:15}},fmt(totalSav+investTotal))
          )
        ),

        React.createElement(Card,null,
          React.createElement(ST,{emoji:"📋"},"SPENDING BREAKDOWN"),
          React.createElement('div',{style:{overflowX:"auto"}},
            React.createElement('table',{style:{width:"100%",borderCollapse:"collapse",fontSize:12}},
              React.createElement('thead',null,
                React.createElement('tr',{style:{borderBottom:"2px solid rgba(249,115,22,0.2)"}},
                  ["Category","Budget","Spent","Diff"].map(h=>React.createElement('th',{key:h,style:{padding:"6px 6px",textAlign:h==="Category"?"left":"right",fontWeight:700,opacity:0.6,fontSize:10,letterSpacing:0.6}},h))
                )
              ),
              React.createElement('tbody',null,
                cats.map(c=>{
                  const spent=catTotals[c.id]||0; const diff=spent-c.budget; const over=diff>0;
                  return React.createElement('tr',{key:c.id,style:{borderBottom:"1px solid rgba(249,115,22,0.07)",background:over?"rgba(239,68,68,0.04)":"transparent"}},
                    React.createElement('td',{style:{padding:"8px 6px",fontWeight:600,minWidth:90}},
                      React.createElement('span',{style:{display:"inline-block",width:7,height:7,borderRadius:"50%",background:c.color,marginRight:6}}),
                      c.name,
                      React.createElement(PBar,{pct:c.budget>0?(spent/c.budget)*100:0,color:c.color,over})
                    ),
                    React.createElement('td',{style:{padding:"8px 6px",textAlign:"right",opacity:0.65,whiteSpace:"nowrap"}},fmt(c.budget)),
                    React.createElement('td',{style:{padding:"8px 6px",textAlign:"right",fontWeight:700,color:over?"#ef4444":"#7c2d12",whiteSpace:"nowrap"}},fmt(spent)),
                    React.createElement('td',{style:{padding:"8px 6px",textAlign:"right",fontWeight:700,color:over?"#ef4444":"#16a34a",whiteSpace:"nowrap"}},(over?"▲":"▼")+fmt(Math.abs(diff)))
                  );
                }),
                React.createElement('tr',{style:{borderTop:"2px solid rgba(249,115,22,0.2)",fontWeight:900}},
                  React.createElement('td',{style:{padding:"9px 6px"}},"TOTAL"),
                  React.createElement('td',{style:{padding:"9px 6px",textAlign:"right",whiteSpace:"nowrap"}},fmt(totalBudg)),
                  React.createElement('td',{style:{padding:"9px 6px",textAlign:"right",color:totalExp>totalBudg?"#ef4444":"#7c2d12",whiteSpace:"nowrap"}},fmt(totalExp)),
                  React.createElement('td',{style:{padding:"9px 6px",textAlign:"right",color:totalExp>totalBudg?"#ef4444":"#16a34a",whiteSpace:"nowrap"}},(totalExp>totalBudg?"▲":"▼")+fmt(Math.abs(totalExp-totalBudg)))
                )
              )
            )
          )
        )
      ),

      // LOG INCOME
      tab==="log_inc" && React.createElement('div',{style:{animation:"fadeIn 0.4s ease"}},
        React.createElement(Card,null,
          React.createElement(ST,{emoji:"💵"},"LOG INCOME"),
          React.createElement('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
            React.createElement('div',null,
              React.createElement('label',{style:{fontSize:11,fontWeight:700,opacity:0.6,display:"block",marginBottom:4}},"DATE"),
              React.createElement('input',{type:"date",value:inf.date,onChange:e=>setInf(f=>({...f,date:e.target.value})),style:inp})
            ),
            React.createElement('div',null,
              React.createElement('label',{style:{fontSize:11,fontWeight:700,opacity:0.6,display:"block",marginBottom:4}},"TYPE"),
              React.createElement('select',{value:inf.type,onChange:e=>setInf(f=>({...f,type:e.target.value})),style:{...inp,background:"rgba(255,255,255,0.75)"}},
                React.createElement('option',{value:"paycheck"},"💰 Paycheck"),
                React.createElement('option',{value:"roommate"},"🏠 Roommate"),
                React.createElement('option',{value:"bonus"},"🎉 Bonus"),
                React.createElement('option',{value:"other"},"✨ Other")
              )
            ),
            React.createElement('div',{style:{gridColumn:"1/-1"}},
              React.createElement('label',{style:{fontSize:11,fontWeight:700,opacity:0.6,display:"block",marginBottom:4}},"DESCRIPTION"),
              React.createElement('input',{value:inf.desc,onChange:e=>setInf(f=>({...f,desc:e.target.value})),onKeyDown:e=>e.key==="Enter"&&addInc(),placeholder:"e.g. Feb 5 paycheck",style:inp})
            ),
            React.createElement('div',{style:{gridColumn:"1/-1"}},
              React.createElement('label',{style:{fontSize:11,fontWeight:700,opacity:0.6,display:"block",marginBottom:4}},"AMOUNT ($)"),
              React.createElement('input',{type:"number",value:inf.amount,onChange:e=>setInf(f=>({...f,amount:e.target.value})),onKeyDown:e=>e.key==="Enter"&&addInc(),placeholder:"0.00",style:inp})
            )
          ),
          React.createElement('button',{onClick:addInc,style:{marginTop:14,width:"100%",background:"linear-gradient(135deg,#22c55e,#06b6d4)",border:"none",borderRadius:12,color:"#fff",padding:"13px",cursor:"pointer",fontWeight:800,fontSize:15}},"+ Log Income")
        ),
        React.createElement(Card,null,
          React.createElement(ST,{emoji:"📌"},"EXPECTED INCOME (Reference)"),
          React.createElement('p',{style:{fontSize:12,opacity:0.55,marginBottom:12}},"Your typical amounts for quick reference when logging."),
